<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RCJA Soccer Rules</title>
<style>
  :root {
    --navy:        #1b2945;
    --navy-dark:   #152035;
    --navy-mid:    #263a5e;
    --green:       #3db166;
    --green-dark:  #339655;
    --blue-tint:   #eef1f8;
    --border:      #d0d7e3;
    --border-dark: #b0bcd0;
    --border-lt:   #e4e8ef;
    --row-sep:     #f0f0f0;
    --surface:     #f4f6fa;
    --white:       #ffffff;
    --ink:         #0a0a0a;
    --label:       #444444;
    --muted:       #888888;
    --empty:       #aaaaaa;
    --highlight:   rgba(253, 213, 50, 0.35);
    /* semantic */
    --ok-bg:       #f0fdf4; --ok-ink:   #166534;
    --warn-bg:     #fffbeb; --warn-ink: #92400e;
    --err-bg:      #fef2f2; --err-ink:  #991b1b;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--white);
    color: var(--ink);
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── TOP BAR (navy) ─────────────────────────── */
  #top-bar {
    position: sticky; top: 0; z-index: 200;
    background: var(--navy);
    height: 52px;
    display: flex; align-items: center;
    padding: 0 max(16px, env(safe-area-inset-right)) 0 max(16px, env(safe-area-inset-left));
  }
  #top-bar h1 {
    font-size: 16px; font-weight: 700;
    letter-spacing: -0.02em; color: #fff;
  }

  /* ── SEARCH BAR (white, sticky below top-bar) ── */
  #search-bar {
    position: sticky; top: 52px; z-index: 100;
    background: var(--white);
    border-bottom: 1.5px solid var(--border-lt);
    padding: 10px 16px 8px;
  }

  #search-wrap { position: relative; margin-bottom: 8px; }
  #search {
    width: 100%;
    padding: 8px 34px 8px 12px;
    min-height: 44px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 0;
    color: var(--ink);
    font-family: inherit;
    font-size: 16px; /* 16px prevents iOS auto-zoom */
    outline: none;
    transition: border-color 80ms;
    -webkit-appearance: none;
    -webkit-tap-highlight-color: transparent;
  }
  #search:focus { border-color: var(--green); }
  #search::placeholder { color: var(--empty); }
  /* Shrink font on desktop so it matches surrounding UI */
  @media (pointer: fine) {
    #search { font-size: 14px; min-height: unset; padding: 8px 34px 8px 12px; }
  }
  #clear-btn {
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 44px;
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 18px; display: none; line-height: 1;
    transition: color 80ms;
    align-items: center; justify-content: center;
  }
  #clear-btn:hover { color: var(--err-ink); }

  /* ── LEAGUE FILTER ───────────────────────────── */
  #league-filter {
    display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px;
  }
  .league-btn {
    padding: 4px 11px;
    min-height: 44px;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--navy);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 80ms, border-color 80ms, color 80ms;
    border-radius: 0;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .league-btn:hover:not(.active) {
    background: var(--surface);
    border-color: var(--border-dark);
  }
  .league-btn.active {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }
  /* Desktop: restore compact height */
  @media (pointer: fine) {
    .league-btn { min-height: unset; }
  }

  /* ── TOOLBAR ──────────────────────────────────── */
  #toolbar {
    display: flex; align-items: center;
    margin-bottom: 2px;
  }
  #result-count {
    font-size: 12px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.07em;
  }
  #changes-toggle {
    padding: 4px 11px;
    min-height: 44px;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--navy);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 80ms, border-color 80ms, color 80ms;
    white-space: nowrap;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center;
  }
  #changes-toggle input { display: none; }
  #changes-toggle:has(input:checked) {
    background: var(--warn-bg);
    border-color: var(--warn-ink);
    color: var(--warn-ink);
  }
  #changes-toggle:hover:not(:has(input:checked)) {
    background: var(--surface);
    border-color: var(--border-dark);
  }
  @media (pointer: fine) {
    #changes-toggle { min-height: unset; }
  }

  /* ── RESULTS ──────────────────────────────────── */
  #results {
    padding: 12px 16px 80px;
    padding-bottom: max(80px, calc(60px + env(safe-area-inset-bottom)));
    max-width: 860px;
  }

  /* ── EMPTY STATE ──────────────────────────────── */


  /* ── RULE CARD ────────────────────────────────── */
  .rule-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 0;
    margin-bottom: 5px;
    overflow: hidden;
    transition: border-color 80ms;
  }
  .rule-card:hover { border-color: var(--border-dark); }
  .rule-card.expanded { border-color: var(--navy-mid); }

  .rule-main {
    padding: 10px 12px;
    cursor: pointer;
  }
  .rule-main:focus {
    outline: 2px solid var(--green);
    outline-offset: -2px;
  }
  .rule-main:focus:not(:focus-visible) {
    outline: none;
  }
  .rule-header {
    display: flex; align-items: center; gap: 7px;
    margin-bottom: 5px; flex-wrap: wrap;
  }

  /* Rule number badge — table-header style */
  .rule-number {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.07em;
    color: #fff;
    background: var(--navy);
    padding: 2px 7px;
    white-space: nowrap; flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  .type-note .rule-number {
    background: var(--ok-ink);
  }
  .type-advice .rule-number {
    background: var(--warn-ink);
  }

  .changed-badge {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--warn-ink);
    background: var(--warn-bg);
    border: 1.5px solid var(--warn-ink);
    padding: 1px 6px;
    white-space: nowrap; flex-shrink: 0;
  }

  .breadcrumb {
    font-size: 11px; font-weight: 600;
    color: var(--muted);
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; flex: 1;
    min-width: 0;
  }

  .rule-text {
    font-size: 14px; line-height: 1.55;
    color: var(--ink);
    max-width: 72ch;
  }

  mark {
    background: var(--highlight);
    color: inherit;
    padding: 0 1px;
  }

  /* League pills */
  .league-pills {
    display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
  }
  .league-pill {
    font-size: 11px; font-weight: 600;
    padding: 1px 7px;
    border: 1.5px solid var(--border);
    color: var(--label);
    letter-spacing: 0.03em;
  }

  /* ── CONTEXT EXPANSION ───────────────────────── */
  .rule-context {
    border-top: 1.5px solid var(--border);
    background: var(--surface);
    padding: 10px 12px;
    display: none;
  }
  .rule-card.expanded .rule-context { display: block; }

  .context-heading {
    font-size: 11px; font-weight: 700;
    color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.09em;
    margin-bottom: 8px;
  }
  .context-rule {
    padding: 7px 10px;
    border-top: 1px solid var(--row-sep);
    font-size: 13px; line-height: 1.5;
  }
  .context-rule:first-child { border-top: none; }
  .context-rule.is-match {
    background: var(--blue-tint);
    border-top-color: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .context-rule.is-match + .context-rule { border-top-color: var(--border); }
  .context-rule-num {
    font-size: 11px; font-weight: 700;
    color: var(--navy);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    margin-bottom: 2px;
  }
  .context-rule.is-match .context-rule-num { color: var(--navy); }

  /* ── NO RESULTS ───────────────────────────────── */
  .no-results {
    padding: 50px 0 0;
    color: var(--muted);
  }
  .no-results h3 {
    font-size: 15px; font-weight: 600;
    color: var(--label); margin-bottom: 4px;
  }
  .no-results p { font-size: 13px; }

  /* ── RESPONSIVE ───────────────────────────────── */
  @media (min-width: 600px) {
    #search-bar { padding: 12px 24px 10px; }
    #results { padding: 14px 24px 80px; }
    .rule-text { font-size: 15px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition-duration: 0ms !important; }
  }
</style>
</head>
<body>
<div id="top-bar">
  <h1>RCJA Soccer Rules</h1>
</div>
<div id="search-bar">
  <div id="search-wrap">
    <input id="search" type="search" placeholder="Search rules — e.g. kick-off, 5.7, dribbler, weight" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="Search rules">
    <button id="clear-btn" onclick="clearSearch()" aria-label="Clear search">×</button>
  </div>
  <div id="league-filter">
    <button class="league-btn active" data-league="All" onclick="setLeague(this)" aria-pressed="true">All leagues</button>
    <button class="league-btn" data-league="Simple Simon" onclick="setLeague(this)" aria-pressed="false">Simple Simon</button>
    <button class="league-btn" data-league="Standard" onclick="setLeague(this)" aria-pressed="false">Standard</button>
    <button class="league-btn" data-league="Lightweight" onclick="setLeague(this)" aria-pressed="false">Lightweight</button>
    <button class="league-btn" data-league="Open" onclick="setLeague(this)" aria-pressed="false">Open</button>
    <label id="changes-toggle">
      <input type="checkbox" id="changes-only" onchange="render()">
      ★ 2026
    </label>
  </div>
  <div id="toolbar">
    <span id="result-count" aria-live="polite" aria-atomic="true"></span>
  </div>
</div>
<div id="results"></div>
<script>
const RULES = [{"number":"1.1","text":"In Soccer, students are required to design, build and program robots to compete in a dynamic game of robot soccer against an opposing pair of robots. The robots are autonomously run during gameplay. They detect a ball and score goals on a green carpet playing field.","section":"1. Preface","subsection":"","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"1.1 1. preface in soccer, students are required to design, build and program robots to compete in a dynamic game of robot soccer against an opposing pair of robots. the robots are autonomously run during gameplay. they detect a ball and score goals on a green carpet playing field."},{"number":"1.2","text":"There are four Soccer leagues. All leagues are open to teams of any age (primary and secondary school age).","section":"1. Preface","subsection":"","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"1.2 1. preface there are four soccer leagues. all leagues are open to teams of any age (primary and secondary school age)."},{"number":"1.3","text":"Subject to age limitations and other criteria, teams who perform well in the National Event may qualify for the annual RoboCup Junior International Event:","section":"1. Preface","subsection":"","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"1.3 1. preface subject to age limitations and other criteria, teams who perform well in the national event may qualify for the annual robocup junior international event:"},{"number":"2.1.1","text":"The field has 50 mm thick white lines 250 mm from the walls on every side, which form the border of the out area (exclusive of the white lines). The floor is green or charcoal coloured carpet with neutral points and penalty boxes marked with 25 mm thick black lines.","section":"2. Playing Field","subsection":"2.1 Floor","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2.1.1 2. playing field 2.1 floor the field has 50 mm thick white lines 250 mm from the walls on every side, which form the border of the out area (exclusive of the white lines). the floor is green or charcoal coloured carpet with neutral points and penalty boxes marked with 25 mm thick black lines."},{"number":"2.1.2","text":"The field should be placed so that it is flat and level. The out areas of the field may be either flat or inclined by raising the outside of the field by 10 mm (the incline should allow the ball to roll from the top of the incline to the centre of the playing area).","section":"2. Playing Field","subsection":"2.1 Floor","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2.1.2 2. playing field 2.1 floor the field should be placed so that it is flat and level. the out areas of the field may be either flat or inclined by raising the outside of the field by 10 mm (the incline should allow the ball to roll from the top of the incline to the centre of the playing area)."},{"number":"2.1.3","text":"The field must be a carpet base. The recommended carpet is 3\u20135 mm thick green or charcoal coloured carpet.","section":"2. Playing Field","subsection":"2.1 Floor","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2.1.3 2. playing field 2.1 floor the field must be a carpet base. the recommended carpet is 3\u20135 mm thick green or charcoal coloured carpet."},{"number":"","text":"The Gen2 vinyl mat can be used as a practice mat.","section":"2. Playing Field","subsection":"2.1 Floor","type":"advice","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2. playing field 2.1 floor the gen2 vinyl mat can be used as a practice mat."},{"number":"2.1.4","text":"The field may be placed on a wooden or plastic table or on the floor.","section":"2. Playing Field","subsection":"2.1 Floor","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2.1.4 2. playing field 2.1 floor the field may be placed on a wooden or plastic table or on the floor."},{"number":"2.1.5","text":"All dimensions of the field have a tolerance of 5%.","section":"2. Playing Field","subsection":"2.1 Floor","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2.1.5 2. playing field 2.1 floor all dimensions of the field have a tolerance of 5%."},{"number":"","text":"While all efforts will be made to construct the fields precisely, robots should be designed to allow for this tolerance.","section":"2. Playing Field","subsection":"2.1 Floor","type":"note","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2. playing field 2.1 floor while all efforts will be made to construct the fields precisely, robots should be designed to allow for this tolerance."},{"number":"2.2.1","text":"Matte black walls are placed all around the field, including behind the goals.","section":"2. Playing Field","subsection":"2.2 Walls","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2.2.1 2. playing field 2.2 walls matte black walls are placed all around the field, including behind the goals."},{"number":"2.2.2","text":"Walls are 220 mm high above the playing field. In Simple Simon, Standard and Lightweight Leagues, the walls are at least 100 mm high above the playing field.","section":"2. Playing Field","subsection":"2.2 Walls","type":"rule","leagues":["Simple Simon","Standard","Lightweight"],"changed":true,"searchText":"2.2.2 2. playing field 2.2 walls walls are 220 mm high above the playing field. in simple simon, standard and lightweight leagues, the walls are at least 100 mm high above the playing field."},{"number":"2.2.3","text":"In Open League, the walls are at least 220 mm high above the playing field.","section":"2. Playing Field","subsection":"2.2 Walls","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2.2.3 2. playing field 2.2 walls in open league, the walls are at least 220 mm high above the playing field."},{"number":"","text":"The 220 mm wall height is only required for the Australian National Championships. State challenges are not required to follow this with their field construction.","section":"2. Playing Field","subsection":"2.2 Walls","type":"note","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2. playing field 2.2 walls the 220 mm wall height is only required for the australian national championships. state challenges are not required to follow this with their field construction."},{"number":"2.3.1","text":"The internal width of each goal is 450 mm.","section":"2. Playing Field","subsection":"2.3 Goals","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2.3.1 2. playing field 2.3 goals the internal width of each goal is 450 mm."},{"number":"2.3.2","text":"The internal depth of each goal is 74 mm.","section":"2. Playing Field","subsection":"2.3 Goals","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2.3.2 2. playing field 2.3 goals the internal depth of each goal is 74 mm."},{"number":"2.3.3","text":"Each goal will have a crossbar 140 mm above the playing surface. The depth of the crossbar is a maximum of 20 mm to avoid covering the top of the goal.","section":"2. Playing Field","subsection":"2.3 Goals","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2.3.3 2. playing field 2.3 goals each goal will have a crossbar 140 mm above the playing surface. the depth of the crossbar is a maximum of 20 mm to avoid covering the top of the goal."},{"number":"2.3.4","text":"The back and sides of one goal's interior, as well as the crossbar, are painted matte similar to CMYK cyan (like Dulux Striking Cyan). The back and sides of the interior of the other goal, as well as the crossbar, are painted matte similar to CMYK yellow (like Dulux Dandelion Yellow). The external sides of the goals are painted matte black.","section":"2. Playing Field","subsection":"2.3 Goals","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":true,"searchText":"2.3.4 2. playing field 2.3 goals the back and sides of one goal's interior, as well as the crossbar, are painted matte similar to cmyk cyan (like dulux striking cyan). the back and sides of the interior of the other goal, as well as the crossbar, are painted matte similar to cmyk yellow (like dulux dandelion yellow). the external sides of the goals are painted matte black."},{"number":"2.3.5","text":"The surface within the goal area is flat and level (horizontal).","section":"2. Playing Field","subsection":"2.3 Goals","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2.3.5 2. playing field 2.3 goals the surface within the goal area is flat and level (horizontal)."},{"number":"2.3.6","text":"The sidewalls of the goals extend to the end wall to prevent the ball from rolling behind the goals.","section":"2. Playing Field","subsection":"2.3 Goals","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2.3.6 2. playing field 2.3 goals the sidewalls of the goals extend to the end wall to prevent the ball from rolling behind the goals."},{"number":"2.4.1","text":"There are two neutral points, as shown on the field diagram in section 2.1.","section":"2. Playing Field","subsection":"2.4 Neutral Points","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2.4.1 2. playing field 2.4 neutral points there are two neutral points, as shown on the field diagram in section 2.1."},{"number":"2.4.2","text":"A neutral point is also designated in the middle of the field. This is only used for starting games and placing the ball after multiple calls of lack of progress, or if all other neutral points are occupied.","section":"2. Playing Field","subsection":"2.4 Neutral Points","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2.4.2 2. playing field 2.4 neutral points a neutral point is also designated in the middle of the field. this is only used for starting games and placing the ball after multiple calls of lack of progress, or if all other neutral points are occupied."},{"number":"2.5.1","text":"Teams must come prepared to calibrate their robots based on the lighting and magnetic conditions at the venue. It is recommended that teams design their robots to cope with variations in lighting and magnetic conditions, as these vary from venue to venue. Teams with vision systems should also be calibrated and constructed in a way to minimise interference from outside the field.","section":"2. Playing Field","subsection":"2.5 Lighting and Magnetic Conditions","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":true,"searchText":"2.5.1 2. playing field 2.5 lighting and magnetic conditions teams must come prepared to calibrate their robots based on the lighting and magnetic conditions at the venue. it is recommended that teams design their robots to cope with variations in lighting and magnetic conditions, as these vary from venue to venue. teams with vision systems should also be calibrated and constructed in a way to minimise interference from outside the field."},{"number":"","text":"At the Australian Open, all fields will be raised off the floor by at least 450 mm to minimise magnetic interference.","section":"2. Playing Field","subsection":"2.5 Lighting and Magnetic Conditions","type":"note","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"2. playing field 2.5 lighting and magnetic conditions at the australian open, all fields will be raised off the floor by at least 450 mm to minimise magnetic interference."},{"number":"3.1.1","text":"For Simple Simon, Standard and Lightweight Leagues, an infrared ball will be used. See Appendix A.","section":"3. Ball","subsection":"3.1 Specification","type":"rule","leagues":["Simple Simon","Standard","Lightweight"],"changed":false,"searchText":"3.1.1 3. ball 3.1 specification for simple simon, standard and lightweight leagues, an infrared ball will be used. see appendix a."},{"number":"3.1.2","text":"For Open League, a passive orange golf ball will be used. See Appendix B. Purchasing the passive ball via the RCJA Store is recommended.","section":"3. Ball","subsection":"3.1 Specification","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"3.1.2 3. ball 3.1 specification for open league, a passive orange golf ball will be used. see appendix b. purchasing the passive ball via the rcja store is recommended."},{"number":"3.1.3","text":"If the infrared ball has a fast-flashing LED (indicating low battery power), the batteries or the ball shall be replaced prior to the start of the game or at the earliest stoppage in play. Match timing shall be paused while the issue is rectified.","section":"3. Ball","subsection":"3.1 Specification","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"3.1.3 3. ball 3.1 specification if the infrared ball has a fast-flashing led (indicating low battery power), the batteries or the ball shall be replaced prior to the start of the game or at the earliest stoppage in play. match timing shall be paused while the issue is rectified."},{"number":"3.2.1","text":"The official infrared balls for all RCJA tournaments will be the Elekit RCJ-05 soccer ball available from Modern Teaching Aids.","section":"3. Ball","subsection":"3.2 Ball Suppliers","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"3.2.1 3. ball 3.2 ball suppliers the official infrared balls for all rcja tournaments will be the elekit rcj-05 soccer ball available from modern teaching aids."},{"number":"","text":"The older, dark-grey coloured infrared ball previously sold by HiTechnic, or approved open-source alternatives, as they come available, is also acceptable.","section":"3. Ball","subsection":"3.2 Ball Suppliers","type":"note","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"3. ball 3.2 ball suppliers the older, dark-grey coloured infrared ball previously sold by hitechnic, or approved open-source alternatives, as they come available, is also acceptable."},{"number":"3.2.2","text":"A passive orange ball that suits the requirements set out in the Ball Specification document (see Rule 3.1.2) will be used for the Open League.","section":"3. Ball","subsection":"3.2 Ball Suppliers","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"3.2.2 3. ball 3.2 ball suppliers a passive orange ball that suits the requirements set out in the ball specification document (see rule 3.1.2) will be used for the open league."},{"number":"","text":"The new IR ball can be purchased from the RCJA website store: <https://www.robocupjunior.org.au/product/2027-lightweight-soccer-small-ir-ball/>","section":"3. Ball","subsection":"3.3 Lightweight Ball Change 2027","type":"note","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"3. ball 3.3 lightweight ball change 2027 the new ir ball can be purchased from the rcja website store: <https://www.robocupjunior.org.au/product/2027-lightweight-soccer-small-ir-ball/>"},{"number":"4.1.1","text":"A robot's dimensions and characteristics must not exceed the following limits:","section":"4. Robots","subsection":"4.1 Dimensions","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.1.1 4. robots 4.1 dimensions a robot's dimensions and characteristics must not exceed the following limits:"},{"number":"4.1.2","text":"A robot, as positioned in gameplay, must rotate freely within an upright 220 mm diameter cylinder and pose little or no resistance to it. Each robot, in its gameplay configuration, must fit within a vertical cylinder with a diameter of 220 mm. The cylinder must be able to rotate freely around the robot and encounter no significant resistance.","section":"4. Robots","subsection":"4.1 Dimensions","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":true,"searchText":"4.1.2 4. robots 4.1 dimensions a robot, as positioned in gameplay, must rotate freely within an upright 220 mm diameter cylinder and pose little or no resistance to it. each robot, in its gameplay configuration, must fit within a vertical cylinder with a diameter of 220 mm. the cylinder must be able to rotate freely around the robot and encounter no significant resistance."},{"number":"4.1.3","text":"While being inspected, each robot must be positioned as it will be in gameplay and at its maximum size \u2014 anything that protrudes from the robot must be fully extended. If a robot has a moving part that extends in two directions, it will be inspected with this part operating. The robot must be able to operate without touching the measuring cylinder.","section":"4. Robots","subsection":"4.1 Dimensions","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.1.3 4. robots 4.1 dimensions while being inspected, each robot must be positioned as it will be in gameplay and at its maximum size \u2014 anything that protrudes from the robot must be fully extended. if a robot has a moving part that extends in two directions, it will be inspected with this part operating. the robot must be able to operate without touching the measuring cylinder."},{"number":"","text":"It is recommended to design your robot to a smaller size, such as 210 mm, to allow for tolerances.","section":"4. Robots","subsection":"4.1 Dimensions","type":"note","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4. robots 4.1 dimensions it is recommended to design your robot to a smaller size, such as 210 mm, to allow for tolerances."},{"number":"4.1.4","text":"In Lightweight and Open Leagues, no voltage on a robot should exceed 48 V DC or 25 V AC RMS at any point and at any time. This refers to the maximum voltage, not the nominal voltage, and includes voltage pumps used for a kicker (see kicker limitations).","section":"4. Robots","subsection":"4.1 Dimensions","type":"rule","leagues":["Lightweight","Open"],"changed":false,"searchText":"4.1.4 4. robots 4.1 dimensions in lightweight and open leagues, no voltage on a robot should exceed 48 v dc or 25 v ac rms at any point and at any time. this refers to the maximum voltage, not the nominal voltage, and includes voltage pumps used for a kicker (see kicker limitations)."},{"number":"4.2.1","text":"Robots must be controlled autonomously.","section":"4. Robots","subsection":"4.2 Control","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.2.1 4. robots 4.2 control robots must be controlled autonomously."},{"number":"4.2.2","text":"Robots must be able to be started manually. Robots cannot be started from a secondary device, such as a laptop, tablet or mobile phone. Robots must have their program downloaded to them and be able to be started/restarted manually by the Robot Handler.","section":"4. Robots","subsection":"4.2 Control","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.2.2 4. robots 4.2 control robots must be able to be started manually. robots cannot be started from a secondary device, such as a laptop, tablet or mobile phone. robots must have their program downloaded to them and be able to be started/restarted manually by the robot handler."},{"number":"4.2.3","text":"The use of remote control of any kind is not allowed.","section":"4. Robots","subsection":"4.2 Control","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.2.3 4. robots 4.2 control the use of remote control of any kind is not allowed."},{"number":"4.2.4","text":"Robots must be able to drive in all directions.","section":"4. Robots","subsection":"4.2 Control","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.2.4 4. robots 4.2 control robots must be able to drive in all directions."},{"number":"4.2.5","text":"Communication between robots is acceptable as long as it does not interfere with the performance of other robots, is not detectable outside the venue, and complies with local regulations regarding frequency use and safety.","section":"4. Robots","subsection":"4.2 Control","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.2.5 4. robots 4.2 control communication between robots is acceptable as long as it does not interfere with the performance of other robots, is not detectable outside the venue, and complies with local regulations regarding frequency use and safety."},{"number":"","text":"Teams should perform checks on messages sent between robots. For example, prepend a unique string to a message and check that the string exists, to reduce the possibility of receiving interfering messages from other teams.","section":"4. Robots","subsection":"4.2 Control","type":"advice","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4. robots 4.2 control teams should perform checks on messages sent between robots. for example, prepend a unique string to a message and check that the string exists, to reduce the possibility of receiving interfering messages from other teams."},{"number":"4.2.6","text":"Robots must have the ability to have their communication disabled at the request of the referee.","section":"4. Robots","subsection":"4.2 Control","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.2.6 4. robots 4.2 control robots must have the ability to have their communication disabled at the request of the referee."},{"number":"4.3.1","text":"Competitors must mark or decorate their robots to identify them as belonging to the same team. These must not influence gameplay and will not be considered in the height restrictions.","section":"4. Robots","subsection":"4.3 Marking/Colouring","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.3.1 4. robots 4.3 marking/colouring competitors must mark or decorate their robots to identify them as belonging to the same team. these must not influence gameplay and will not be considered in the height restrictions."},{"number":"4.3.2","text":"Colours of robots and/or light transmitters must not interfere with the sensor readings of other robots.","section":"4. Robots","subsection":"4.3 Marking/Colouring","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.3.2 4. robots 4.3 marking/colouring colours of robots and/or light transmitters must not interfere with the sensor readings of other robots."},{"number":"","text":"In Lightweight and Open, avoid having cyan, yellow or orange visible on the outside of the robot as it may interfere with other robots using cameras.","section":"4. Robots","subsection":"4.3 Marking/Colouring","type":"advice","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4. robots 4.3 marking/colouring in lightweight and open, avoid having cyan, yellow or orange visible on the outside of the robot as it may interfere with other robots using cameras."},{"number":"4.4.1","text":"All teams shall consist of no more than two (2) robots. Any substitution of extra robots during a tournament is forbidden, and disqualification will result. Teams cannot enter the competition venue with more than two constructed robots.","section":"4. Robots","subsection":"4.4 Number of Robots","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.4.1 4. robots 4.4 number of robots all teams shall consist of no more than two (2) robots. any substitution of extra robots during a tournament is forbidden, and disqualification will result. teams cannot enter the competition venue with more than two constructed robots."},{"number":"4.5.1","text":"A robot must be constructed with the following parts:","section":"4. Robots","subsection":"4.5 Construction","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.5.1 4. robots 4.5 construction a robot must be constructed with the following parts:"},{"number":"4.5.2","text":"For Simple Simon and Standard Leagues, all parts used in the robot construction (other than allowed exceptions) must be strictly LEGO-brand pieces, motors and sensors.","section":"4. Robots","subsection":"4.5 Construction","type":"rule","leagues":["Simple Simon","Standard"],"changed":false,"searchText":"4.5.2 4. robots 4.5 construction for simple simon and standard leagues, all parts used in the robot construction (other than allowed exceptions) must be strictly lego-brand pieces, motors and sensors."},{"number":"4.5.3","text":"For Simple Simon and Standard Leagues, only sensors on the official list at <https://www.robocupjunior.org.au/soccer/sensors/> are allowed.","section":"4. Robots","subsection":"4.5 Construction","type":"rule","leagues":["Simple Simon","Standard"],"changed":false,"searchText":"4.5.3 4. robots 4.5 construction for simple simon and standard leagues, only sensors on the official list at <https://www.robocupjunior.org.au/soccer/sensors/> are allowed."},{"number":"4.5.4","text":"For Simple Simon League only, built-in or external compass or gyro sensors are not permitted.","section":"4. Robots","subsection":"4.5 Construction","type":"rule","leagues":["Simple Simon"],"changed":false,"searchText":"4.5.4 4. robots 4.5 construction for simple simon league only, built-in or external compass or gyro sensors are not permitted."},{"number":"4.5.5","text":"For Standard League only, any non-LEGO omni-directional wheels can be used. The wheels must have a maximum diameter of 80 mm and may be custom manufactured from any material; however, the structural axle connecting the wheel to the robot must be an unmodified LEGO piece.","section":"4. Robots","subsection":"4.5 Construction","type":"rule","leagues":["Standard"],"changed":true,"searchText":"4.5.5 4. robots 4.5 construction for standard league only, any non-lego omni-directional wheels can be used. the wheels must have a maximum diameter of 80 mm and may be custom manufactured from any material; however, the structural axle connecting the wheel to the robot must be an unmodified lego piece."},{"number":"4.5.6","text":"Cable ties or tape may be used as a handle or to secure wires, but must not be part of robot construction.","section":"4. Robots","subsection":"4.5 Construction","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.5.6 4. robots 4.5 construction cable ties or tape may be used as a handle or to secure wires, but must not be part of robot construction."},{"number":"4.5.7","text":"All robots must have a stable and easily noticeable handle to hold and lift them. The handle must be easily accessible and allow the robot to be picked up from at least 50 mm above the highest structure of the robot. The handle's dimensions may exceed the robot height limit, but the part exceeding this limit cannot be used to mount components.","section":"4. Robots","subsection":"4.5 Construction","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.5.7 4. robots 4.5 construction all robots must have a stable and easily noticeable handle to hold and lift them. the handle must be easily accessible and allow the robot to be picked up from at least 50 mm above the highest structure of the robot. the handle's dimensions may exceed the robot height limit, but the part exceeding this limit cannot be used to mount components."},{"number":"","text":"Cable ties make a strong lightweight handle.","section":"4. Robots","subsection":"4.5 Construction","type":"advice","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4. robots 4.5 construction cable ties make a strong lightweight handle."},{"number":"4.5.8","text":"Robots can be built with a speaker for emitting noises like music or beeps if it is only used for debugging. Any use of the speaker during gameplay will have the robot deemed \"damaged\" per section 5.7.1.7.","section":"4. Robots","subsection":"4.5 Construction","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":true,"searchText":"4.5.8 4. robots 4.5 construction robots can be built with a speaker for emitting noises like music or beeps if it is only used for debugging. any use of the speaker during gameplay will have the robot deemed \"damaged\" per section 5.7.1.7."},{"number":"4.6.1","text":"Ball Capturing Zones are defined as any internal space created when a straight edge is placed on the protruding points of a robot.","section":"4. Robots","subsection":"4.6 Ball Capturing Zones and Movement","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.6.1 4. robots 4.6 ball capturing zones and movement ball capturing zones are defined as any internal space created when a straight edge is placed on the protruding points of a robot."},{"number":"4.6.2","text":"The ball cannot penetrate the Ball Capturing Zone by more than the limit specified in rule 4.1.1.","section":"4. Robots","subsection":"4.6 Ball Capturing Zones and Movement","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.6.2 4. robots 4.6 ball capturing zones and movement the ball cannot penetrate the ball capturing zone by more than the limit specified in rule 4.1.1."},{"number":"4.6.3","text":"A robot cannot \"hold\" a ball. Holding means taking full control of the ball by removing all of its degrees of freedom \u2014 e.g. fixing it to the robot's body, surrounding it, encircling it, or otherwise trapping it. If a ball stops rolling while a robot is moving, or does not rebound when rolled into a robot, it is a good indication the ball is trapped.","section":"4. Robots","subsection":"4.6 Ball Capturing Zones and Movement","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.6.3 4. robots 4.6 ball capturing zones and movement a robot cannot \"hold\" a ball. holding means taking full control of the ball by removing all of its degrees of freedom \u2014 e.g. fixing it to the robot's body, surrounding it, encircling it, or otherwise trapping it. if a ball stops rolling while a robot is moving, or does not rebound when rolled into a robot, it is a good indication the ball is trapped."},{"number":"4.6.4","text":"The ball cannot be held underneath a robot.","section":"4. Robots","subsection":"4.6 Ball Capturing Zones and Movement","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.6.4 4. robots 4.6 ball capturing zones and movement the ball cannot be held underneath a robot."},{"number":"4.6.5","text":"In Simple Simon and Standard Leagues, the use of a dribbler is not allowed. A dribbler is a rotating drum or wheel that imparts dynamic backspin on the ball to keep it on its surface.","section":"4. Robots","subsection":"4.6 Ball Capturing Zones and Movement","type":"rule","leagues":["Simple Simon","Standard"],"changed":false,"searchText":"4.6.5 4. robots 4.6 ball capturing zones and movement in simple simon and standard leagues, the use of a dribbler is not allowed. a dribbler is a rotating drum or wheel that imparts dynamic backspin on the ball to keep it on its surface."},{"number":"4.6.6","text":"In Lightweight and Open Leagues, a dribbler is allowed and is the only exception to rule 4.6.3. The dribbler must comply with rules 4.6.2 and 4.6.4. A robot using a dribbler must release the ball in order to score a goal.","section":"4. Robots","subsection":"4.6 Ball Capturing Zones and Movement","type":"rule","leagues":["Lightweight","Open"],"changed":false,"searchText":"4.6.6 4. robots 4.6 ball capturing zones and movement in lightweight and open leagues, a dribbler is allowed and is the only exception to rule 4.6.3. the dribbler must comply with rules 4.6.2 and 4.6.4. a robot using a dribbler must release the ball in order to score a goal."},{"number":"4.7.1","text":"A robot's kicker cannot exceed a certain power. Kicker power is measured by an on-field test using the tournament ball for the relevant division. The test places the robot inside the left corner of a goal and performs a kick into the opposing goal. The test is passed if the ball bounces off the opposite goal and does not leave the penalty area of the opposing goal after bouncing back.","section":"4. Robots","subsection":"4.7 Kickers (Lightweight and Open Leagues Only)","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.7.1 4. robots 4.7 kickers (lightweight and open leagues only) a robot's kicker cannot exceed a certain power. kicker power is measured by an on-field test using the tournament ball for the relevant division. the test places the robot inside the left corner of a goal and performs a kick into the opposing goal. the test is passed if the ball bounces off the opposite goal and does not leave the penalty area of the opposing goal after bouncing back."},{"number":"4.7.2","text":"Robots that exceed the limitations must decrease the power of, or disable, the kicker.","section":"4. Robots","subsection":"4.7 Kickers (Lightweight and Open Leagues Only)","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.7.2 4. robots 4.7 kickers (lightweight and open leagues only) robots that exceed the limitations must decrease the power of, or disable, the kicker."},{"number":"","text":"Teams should build in the ability to adjust the power of a robot's kicker during the competition.","section":"4. Robots","subsection":"4.7 Kickers (Lightweight and Open Leagues Only)","type":"advice","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4. robots 4.7 kickers (lightweight and open leagues only) teams should build in the ability to adjust the power of a robot's kicker during the competition."},{"number":"4.7.3","text":"Kicker power is subject to compliance check at any time during the competition, such as during scrutineering, before a half, or when a game is about to be restarted after a goal.","section":"4. Robots","subsection":"4.7 Kickers (Lightweight and Open Leagues Only)","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"4.7.3 4. robots 4.7 kickers (lightweight and open leagues only) kicker power is subject to compliance check at any time during the competition, such as during scrutineering, before a half, or when a game is about to be restarted after a goal."},{"number":"5.1.1","text":"Organisers will provide access to the competition area for calibration and testing prior to the competition, according to a schedule made available at the start of the event.","section":"5. Game Play","subsection":"5.1 Pre-game Setup","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.1.1 5. game play 5.1 pre-game setup organisers will provide access to the competition area for calibration and testing prior to the competition, according to a schedule made available at the start of the event."},{"number":"5.1.2","text":"Organisers will make every effort to allow at least 5 minutes of setup time before each game.","section":"5. Game Play","subsection":"5.1 Pre-game Setup","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.1.2 5. game play 5.1 pre-game setup organisers will make every effort to allow at least 5 minutes of setup time before each game."},{"number":"5.1.3","text":"This time is also for teams to express any concerns about the legality of opposing robots.","section":"5. Game Play","subsection":"5.1 Pre-game Setup","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.1.3 5. game play 5.1 pre-game setup this time is also for teams to express any concerns about the legality of opposing robots."},{"number":"5.2.1","text":"The game consists of two 5-minute halves. Some competitions may choose to run 10-minute halves at the discretion of the tournament organising committee.","section":"5. Game Play","subsection":"5.2 Length of Game","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.2.1 5. game play 5.2 length of game the game consists of two 5-minute halves. some competitions may choose to run 10-minute halves at the discretion of the tournament organising committee."},{"number":"5.2.2","text":"There will be a 5-minute break between the halves.","section":"5. Game Play","subsection":"5.2 Length of Game","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.2.2 5. game play 5.2 length of game there will be a 5-minute break between the halves."},{"number":"5.2.3","text":"The game clock runs for the duration of the game without stopping, except as noted in Referee's Timeout (section 5.10.4).","section":"5. Game Play","subsection":"5.2 Length of Game","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.2.3 5. game play 5.2 length of game the game clock runs for the duration of the game without stopping, except as noted in referee's timeout (section 5.10.4)."},{"number":"5.2.4","text":"Teams can be penalised one goal per minute at the referee's discretion if they are late.","section":"5. Game Play","subsection":"5.2 Length of Game","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.2.4 5. game play 5.2 length of game teams can be penalised one goal per minute at the referee's discretion if they are late."},{"number":"5.2.5","text":"If a team does not report within 10 minutes of the scheduled game time, they forfeit the game and the winning team is awarded a 10\u20130 score line. The 10 minutes includes any break times.","section":"5. Game Play","subsection":"5.2 Length of Game","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.2.5 5. game play 5.2 length of game if a team does not report within 10 minutes of the scheduled game time, they forfeit the game and the winning team is awarded a 10\u20130 score line. the 10 minutes includes any break times."},{"number":"5.2.6","text":"A game ends when there is a goal difference of 10 goals. The losing team may elect to continue playing, but the recorded score (10-goal difference) will not change.","section":"5. Game Play","subsection":"5.2 Length of Game","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.2.6 5. game play 5.2 length of game a game ends when there is a goal difference of 10 goals. the losing team may elect to continue playing, but the recorded score (10-goal difference) will not change."},{"number":"5.2.7","text":"Teams may elect to end a game early; however, they forfeit the game and the winning team is awarded a 10\u20130 score line.","section":"5. Game Play","subsection":"5.2 Length of Game","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.2.7 5. game play 5.2 length of game teams may elect to end a game early; however, they forfeit the game and the winning team is awarded a 10\u20130 score line."},{"number":"5.3.1","text":"At the start of the first half, the referee tosses a coin, and the team first mentioned in the draw calls the coin while it is in the air.","section":"5. Game Play","subsection":"5.3 Start of Game","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.3.1 5. game play 5.3 start of game at the start of the first half, the referee tosses a coin, and the team first mentioned in the draw calls the coin while it is in the air."},{"number":"5.3.2","text":"The winner of the toss can choose either (a) which end to kick to, or (b) to kick off first.","section":"5. Game Play","subsection":"5.3 Start of Game","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.3.2 5. game play 5.3 start of game the winner of the toss can choose either (a) which end to kick to, or (b) to kick off first."},{"number":"5.3.3","text":"The loser of the toss decides the other option.","section":"5. Game Play","subsection":"5.3 Start of Game","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.3.3 5. game play 5.3 start of game the loser of the toss decides the other option."},{"number":"5.3.4","text":"The team not kicking off in the first half will kick off to begin the second half.","section":"5. Game Play","subsection":"5.3 Start of Game","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.3.4 5. game play 5.3 start of game the team not kicking off in the first half will kick off to begin the second half."},{"number":"5.4.1","text":"Each half of the game begins with a kick-off.","section":"5. Game Play","subsection":"5.4 Kick-Offs","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.4.1 5. game play 5.4 kick-offs each half of the game begins with a kick-off."},{"number":"5.4.2","text":"All robots must be located on their defensive side of the field. Robots must not be moving.","section":"5. Game Play","subsection":"5.4 Kick-Offs","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.4.2 5. game play 5.4 kick-offs all robots must be located on their defensive side of the field. robots must not be moving."},{"number":"5.4.3","text":"The ball is positioned by the referee in the centre of the field.","section":"5. Game Play","subsection":"5.4 Kick-Offs","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.4.3 5. game play 5.4 kick-offs the ball is positioned by the referee in the centre of the field."},{"number":"5.4.4","text":"The team kicking off places their robots on the field first. Robots cannot be moved once placed.","section":"5. Game Play","subsection":"5.4 Kick-Offs","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.4.4 5. game play 5.4 kick-offs the team kicking off places their robots on the field first. robots cannot be moved once placed."},{"number":"5.4.5","text":"All robots on the team not kicking off must have some part of the robot in the penalty box.","section":"5. Game Play","subsection":"5.4 Kick-Offs","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.4.5 5. game play 5.4 kick-offs all robots on the team not kicking off must have some part of the robot in the penalty box."},{"number":"5.4.6","text":"On the referee's command, all robots will be started immediately by human team members.","section":"5. Game Play","subsection":"5.4 Kick-Offs","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.4.6 5. game play 5.4 kick-offs on the referee's command, all robots will be started immediately by human team members."},{"number":"5.4.7","text":"The robot kicking off must make a clear strike of the ball and it must roll clear of the robot by at least 50 mm, or the robot must start at least 50 mm from the ball. An illegal kick-off will result in the opposing team being granted the kick-off.","section":"5. Game Play","subsection":"5.4 Kick-Offs","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.4.7 5. game play 5.4 kick-offs the robot kicking off must make a clear strike of the ball and it must roll clear of the robot by at least 50 mm, or the robot must start at least 50 mm from the ball. an illegal kick-off will result in the opposing team being granted the kick-off."},{"number":"5.4.8","text":"Any robots started before the referee's command will be treated as damaged.","section":"5. Game Play","subsection":"5.4 Kick-Offs","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.4.8 5. game play 5.4 kick-offs any robots started before the referee's command will be treated as damaged."},{"number":"5.5.1","text":"A goal is scored when the ball strikes the back wall of the goal. The referee will announce the goal.","section":"5. Game Play","subsection":"5.5 Scoring","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.5.1 5. game play 5.5 scoring a goal is scored when the ball strikes the back wall of the goal. the referee will announce the goal."},{"number":"5.5.2","text":"A goal will be awarded if a ball deemed to be travelling into the goal strikes a defensive robot that is touching the back wall of the goal.","section":"5. Game Play","subsection":"5.5 Scoring","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.5.2 5. game play 5.5 scoring a goal will be awarded if a ball deemed to be travelling into the goal strikes a defensive robot that is touching the back wall of the goal."},{"number":"","text":"Robots should be built so that the crossbar prevents them from going inside the goal.","section":"5. Game Play","subsection":"5.5 Scoring","type":"advice","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5. game play 5.5 scoring robots should be built so that the crossbar prevents them from going inside the goal."},{"number":"5.5.3","text":"After a goal is scored, a kick-off occurs. The non-scoring team is awarded the ball.","section":"5. Game Play","subsection":"5.5 Scoring","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.5.3 5. game play 5.5 scoring after a goal is scored, a kick-off occurs. the non-scoring team is awarded the ball."},{"number":"5.5.4","text":"\"Own goals\" will be treated as a goal to the opposition.","section":"5. Game Play","subsection":"5.5 Scoring","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.5.4 5. game play 5.5 scoring \"own goals\" will be treated as a goal to the opposition."},{"number":"5.6.1","text":"The referee will call \"Lack of Progress\" in the following situations:","section":"5. Game Play","subsection":"5.6 Lack of Progress","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.6.1 5. game play 5.6 lack of progress the referee will call \"lack of progress\" in the following situations:"},{"number":"5.6.1.1","text":"If no robot has any chance of locating the ball in a reasonable amount of time.","section":"5. Game Play","subsection":"5.6 Lack of Progress","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.6.1.1 5. game play 5.6 lack of progress if no robot has any chance of locating the ball in a reasonable amount of time."},{"number":"5.6.1.2","text":"If the ball is stuck between multiple robots for a reasonable amount of time.","section":"5. Game Play","subsection":"5.6 Lack of Progress","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.6.1.2 5. game play 5.6 lack of progress if the ball is stuck between multiple robots for a reasonable amount of time."},{"number":"5.6.1.3","text":"When a robot is using greater power to \"force\" the ball past an opposition robot that is in its penalty box. If a referee is slow to remove the ball and a goal is scored as a direct result of forcing the ball through, the goal will be disallowed.","section":"5. Game Play","subsection":"5.6 Lack of Progress","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.6.1.3 5. game play 5.6 lack of progress when a robot is using greater power to \"force\" the ball past an opposition robot that is in its penalty box. if a referee is slow to remove the ball and a goal is scored as a direct result of forcing the ball through, the goal will be disallowed."},{"number":"5.6.1.4","text":"When a robot with the ball is using greater power to \"force\" two opposing robots into their penalty box, causing both to go into a multiple defence situation (see 5.11). This rule takes priority over multiple defence.","section":"5. Game Play","subsection":"5.6 Lack of Progress","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":true,"searchText":"5.6.1.4 5. game play 5.6 lack of progress when a robot with the ball is using greater power to \"force\" two opposing robots into their penalty box, causing both to go into a multiple defence situation (see 5.11). this rule takes priority over multiple defence."},{"number":"5.6.2","text":"When \"Lack of Progress\" is called, the ball is first moved to the nearest neutral point. If this occurs again, the ball is moved to the centre of the field.","section":"5. Game Play","subsection":"5.6 Lack of Progress","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.6.2 5. game play 5.6 lack of progress when \"lack of progress\" is called, the ball is first moved to the nearest neutral point. if this occurs again, the ball is moved to the centre of the field."},{"number":"5.6.3","text":"When Lack of Progress is called, any stuck robots will be freed using minimal movement by the referee or team captains at the referee's request. Stuck robots should not be moved at any other time.","section":"5. Game Play","subsection":"5.6 Lack of Progress","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.6.3 5. game play 5.6 lack of progress when lack of progress is called, any stuck robots will be freed using minimal movement by the referee or team captains at the referee's request. stuck robots should not be moved at any other time."},{"number":"5.7.1","text":"The referee will deem a robot \"damaged\" in the following situations:","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.7.1 5. game play 5.7 damaged robots the referee will deem a robot \"damaged\" in the following situations:"},{"number":"5.7.1.1","text":"If a robot does not respond to the ball.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.7.1.1 5. game play 5.7 damaged robots if a robot does not respond to the ball."},{"number":"5.7.1.2","text":"If a robot remains in the goal area for longer than 20 seconds, or is stuck against walls or goals, and shows no indication of returning to the playing area. > Advice: A small reverse command in a program will usually free a stuck robot.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.7.1.2 5. game play 5.7 damaged robots if a robot remains in the goal area for longer than 20 seconds, or is stuck against walls or goals, and shows no indication of returning to the playing area. > advice: a small reverse command in a program will usually free a stuck robot."},{"number":"5.7.1.3","text":"If a robot turns over and is unable to move. This does not apply if the referee deems the robot tipped over after a collision with an opposition robot; it can then be righted by the referee and continue playing.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.7.1.3 5. game play 5.7 damaged robots if a robot turns over and is unable to move. this does not apply if the referee deems the robot tipped over after a collision with an opposition robot; it can then be righted by the referee and continue playing."},{"number":"5.7.1.4","text":"If a robot damages a ball or the field.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.7.1.4 5. game play 5.7 damaged robots if a robot damages a ball or the field."},{"number":"5.7.1.5","text":"If two colliding robots damage a ball, both robots are deemed damaged.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.7.1.5 5. game play 5.7 damaged robots if two colliding robots damage a ball, both robots are deemed damaged."},{"number":"5.7.1.6","text":"In Lightweight and Open Leagues, if the whole of a robot enters the out area (fully enters the area between the walls and white line). Robots must attempt to stay on the playing field at all times. This does not apply if the referee deems the robot was pushed out by another robot or made an attempt to stay on the field; in that case the referee may slightly push the robot back onto the field at their discretion.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Lightweight","Open"],"changed":false,"searchText":"5.7.1.6 5. game play 5.7 damaged robots in lightweight and open leagues, if the whole of a robot enters the out area (fully enters the area between the walls and white line). robots must attempt to stay on the playing field at all times. this does not apply if the referee deems the robot was pushed out by another robot or made an attempt to stay on the field; in that case the referee may slightly push the robot back onto the field at their discretion."},{"number":"5.7.1.7","text":"If a robot emits a noise from a speaker or buzzer.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":true,"searchText":"5.7.1.7 5. game play 5.7 damaged robots if a robot emits a noise from a speaker or buzzer."},{"number":"5.7.2","text":"A damaged robot must remain off the field for at least thirty seconds (or one minute for ten-minute halves), or until a goal is scored.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.7.2 5. game play 5.7 damaged robots a damaged robot must remain off the field for at least thirty seconds (or one minute for ten-minute halves), or until a goal is scored."},{"number":"5.7.3","text":"Damaged robot removal process:","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.7.3 5. game play 5.7 damaged robots damaged robot removal process:"},{"number":"5.7.3.1","text":"In Simple Simon League, a team member may remove a damaged robot from the field at any time and must inform the referee when they do so.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.7.3.1 5. game play 5.7 damaged robots in simple simon league, a team member may remove a damaged robot from the field at any time and must inform the referee when they do so."},{"number":"5.7.3.2","text":"In Standard, Lightweight and Open Leagues, a team member may only request removal of a damaged robot if the robot is not significantly involved in gameplay (i.e. not near or approaching the ball). They may only remove the robot after the referee gives approval.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Lightweight","Open"],"changed":false,"searchText":"5.7.3.2 5. game play 5.7 damaged robots in standard, lightweight and open leagues, a team member may only request removal of a damaged robot if the robot is not significantly involved in gameplay (i.e. not near or approaching the ball). they may only remove the robot after the referee gives approval."},{"number":"5.7.4","text":"A damaged robot must be repaired and may be returned with the referee's permission. It will be placed on an unoccupied corner of the penalty box on the robot's defending side that does not advantage the robot, e.g. facing the ball.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.7.4 5. game play 5.7 damaged robots a damaged robot must be repaired and may be returned with the referee's permission. it will be placed on an unoccupied corner of the penalty box on the robot's defending side that does not advantage the robot, e.g. facing the ball."},{"number":"","text":"Alternatively, the referee may instruct the team to place the robot on a neutral point if the penalty box is fully occupied, or to avoid a multiple defence situation. Goalies may be returned to the area in front of the goal without advantaging the robot.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"note","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5. game play 5.7 damaged robots alternatively, the referee may instruct the team to place the robot on a neutral point if the penalty box is fully occupied, or to avoid a multiple defence situation. goalies may be returned to the area in front of the goal without advantaging the robot."},{"number":"5.7.5","text":"Play continues during removal, repair and replacement. The referee may choose to interrupt play if robot damage occurred because of a collision with an opposition robot.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.7.5 5. game play 5.7 damaged robots play continues during removal, repair and replacement. the referee may choose to interrupt play if robot damage occurred because of a collision with an opposition robot."},{"number":"5.7.6","text":"When a ball or the field is damaged, a yellow warning sticker is placed on the robot and the referee records the infringement on the scorecard. If two colliding robots damage a ball and the referee considers one robot significantly more aggressive, they may remove that robot from play.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.7.6 5. game play 5.7 damaged robots when a ball or the field is damaged, a yellow warning sticker is placed on the robot and the referee records the infringement on the scorecard. if two colliding robots damage a ball and the referee considers one robot significantly more aggressive, they may remove that robot from play."},{"number":"5.7.7","text":"Adjustments must be made to the robot(s) to prevent damage to the ball or field from recurring.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.7.7 5. game play 5.7 damaged robots adjustments must be made to the robot(s) to prevent damage to the ball or field from recurring."},{"number":"5.7.8","text":"If a robot damages the ball or field again during the tournament, it will be disqualified from the tournament.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.7.8 5. game play 5.7 damaged robots if a robot damages the ball or field again during the tournament, it will be disqualified from the tournament."},{"number":"","text":"If a robot has the power to damage an officially accepted RoboCup Junior Soccer ball, it strongly indicates the robot was built with excessive power and the intention to damage other robots. Such a robot has not been built with the ideals of RCJA and fair competition in mind, and the tournament committee has every right to remove it from the competition.","section":"5. Game Play","subsection":"5.7 Damaged Robots","type":"note","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5. game play 5.7 damaged robots if a robot has the power to damage an officially accepted robocup junior soccer ball, it strongly indicates the robot was built with excessive power and the intention to damage other robots. such a robot has not been built with the ideals of rcja and fair competition in mind, and the tournament committee has every right to remove it from the competition."},{"number":"5.8.1","text":"If a goalie is used, it cannot limit its movement to a single direction on the field. It must be programmed to move in all directions.","section":"5. Game Play","subsection":"5.8 Goalies","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.8.1 5. game play 5.8 goalies if a goalie is used, it cannot limit its movement to a single direction on the field. it must be programmed to move in all directions."},{"number":"5.8.2","text":"The goalie must respond to the ball in a forward direction in an attempt to intercept the ball ahead of the goal. If required, its movement should be able to take some part of the robot outside the penalty box (300 mm from the goal).","section":"5. Game Play","subsection":"5.8 Goalies","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.8.2 5. game play 5.8 goalies the goalie must respond to the ball in a forward direction in an attempt to intercept the ball ahead of the goal. if required, its movement should be able to take some part of the robot outside the penalty box (300 mm from the goal)."},{"number":"","text":"The goalie cannot respond sideways, followed by a forward movement.","section":"5. Game Play","subsection":"5.8 Goalies","type":"note","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5. game play 5.8 goalies the goalie cannot respond sideways, followed by a forward movement."},{"number":"5.8.3","text":"Failure to respond to the ball with a forward movement down the field will result in the robot being classified as \"damaged\" (see rule 5.7).","section":"5. Game Play","subsection":"5.8 Goalies","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.8.3 5. game play 5.8 goalies failure to respond to the ball with a forward movement down the field will result in the robot being classified as \"damaged\" (see rule 5.7)."},{"number":"5.9.1","text":"A ball is considered out of play as follows:","section":"5. Game Play","subsection":"5.9 Ball Out of Play","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":true,"searchText":"5.9.1 5. game play 5.9 ball out of play a ball is considered out of play as follows:"},{"number":"5.9.2","text":"After a ball is considered out of play, it is moved to the nearest neutral point.","section":"5. Game Play","subsection":"5.9 Ball Out of Play","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.9.2 5. game play 5.9 ball out of play after a ball is considered out of play, it is moved to the nearest neutral point."},{"number":"5.10.1","text":"The situations in sections 5.6\u20135.9 may cause play to be interrupted, usually resulting in the ball being moved to the nearest neutral point while play continues.","section":"5. Game Play","subsection":"5.10 Interruption of Game Play","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.10.1 5. game play 5.10 interruption of game play the situations in sections 5.6\u20135.9 may cause play to be interrupted, usually resulting in the ball being moved to the nearest neutral point while play continues."},{"number":"5.10.2","text":"Play may also be stopped by the referee, but the game clock is not stopped unless at the referee's discretion. All robots must be stopped immediately and restarted from their penalty box.","section":"5. Game Play","subsection":"5.10 Interruption of Game Play","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.10.2 5. game play 5.10 interruption of game play play may also be stopped by the referee, but the game clock is not stopped unless at the referee's discretion. all robots must be stopped immediately and restarted from their penalty box."},{"number":"5.10.3","text":"After a stoppage, play resumes on the referee's command and all robots start simultaneously.","section":"5. Game Play","subsection":"5.10 Interruption of Game Play","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.10.3 5. game play 5.10 interruption of game play after a stoppage, play resumes on the referee's command and all robots start simultaneously."},{"number":"5.10.4","text":"A referee may call \"Referee's Timeout\" for field repair, situations such as 5.7.1.3 or 5.12.3, or if the tournament referee is called for rule clarification. The referee can elect to stop the match clock if the stoppage is lengthy.","section":"5. Game Play","subsection":"5.10 Interruption of Game Play","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.10.4 5. game play 5.10 interruption of game play a referee may call \"referee's timeout\" for field repair, situations such as 5.7.1.3 or 5.12.3, or if the tournament referee is called for rule clarification. the referee can elect to stop the match clock if the stoppage is lengthy."},{"number":"5.11.1","text":"Multiple Defence occurs if more than one robot from the defending side enters the penalty area, takes up a defensive position, and substantially affects the game.","section":"5. Game Play","subsection":"5.11 Multiple Defence","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.11.1 5. game play 5.11 multiple defence multiple defence occurs if more than one robot from the defending side enters the penalty area, takes up a defensive position, and substantially affects the game."},{"number":"5.11.2","text":"For a Multiple Defence, the robot having the least influence on play is moved to the centre of the field. Where a goalie is involved, the other player is moved.","section":"5. Game Play","subsection":"5.11 Multiple Defence","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchTe
