xt":"5.11.2 5. game play 5.11 multiple defence for a multiple defence, the robot having the least influence on play is moved to the centre of the field. where a goalie is involved, the other player is moved."},{"number":"5.12.1","text":"If a robot uses a device or action that continuously attacks or charges a robot not in possession of the ball, the referee will call \"Foul!\". The robot is deemed damaged.","section":"5. Game Play","subsection":"5.12 Fouls","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.12.1 5. game play 5.12 fouls if a robot uses a device or action that continuously attacks or charges a robot not in possession of the ball, the referee will call \"foul!\". the robot is deemed damaged."},{"number":"5.12.2","text":"If the robot continues to foul, it is permanently removed from the game, a yellow warning sticker is placed on the robot(s), and the referee records the infringement on the scorecard.","section":"5. Game Play","subsection":"5.12 Fouls","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.12.2 5. game play 5.12 fouls if the robot continues to foul, it is permanently removed from the game, a yellow warning sticker is placed on the robot(s), and the referee records the infringement on the scorecard."},{"number":"5.12.3","text":"If a robot is damaged by a foul, the referee stops the game and the clock for up to 2 minutes while repairs are made (see Referee's Timeout, 5.10.4).","section":"5. Game Play","subsection":"5.12 Fouls","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.12.3 5. game play 5.12 fouls if a robot is damaged by a foul, the referee stops the game and the clock for up to 2 minutes while repairs are made (see referee's timeout, 5.10.4)."},{"number":"5.12.4","text":"If a robot is removed from two games for fouling, it is disqualified from the tournament.","section":"5. Game Play","subsection":"5.12 Fouls","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.12.4 5. game play 5.12 fouls if a robot is removed from two games for fouling, it is disqualified from the tournament."},{"number":"5.13.1","text":"There are no free kicks, penalty kicks or offside rules.","section":"5. Game Play","subsection":"5.13 Free Kicks, Penalty Kicks and Offside","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.13.1 5. game play 5.13 free kicks, penalty kicks and offside there are no free kicks, penalty kicks or offside rules."},{"number":"5.14.1","text":"In general, movement of robots by humans is not acceptable.","section":"5. Game Play","subsection":"5.14 Humans","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.14.1 5. game play 5.14 humans in general, movement of robots by humans is not acceptable."},{"number":"5.14.2","text":"Humans can only move robots at the instruction of the referee.","section":"5. Game Play","subsection":"5.14 Humans","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.14.2 5. game play 5.14 humans humans can only move robots at the instruction of the referee."},{"number":"5.14.3","text":"Before each match, teams should designate one human as \"Captain\", allowed to place, remove and replace robots during the game, based on the rules and as directed by the referee.","section":"5. Game Play","subsection":"5.14 Humans","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.14.3 5. game play 5.14 humans before each match, teams should designate one human as \"captain\", allowed to place, remove and replace robots during the game, based on the rules and as directed by the referee."},{"number":"5.14.4","text":"Other team members may start one robot, but afterwards must not be within the vicinity of the playing field. They must remain more than one metre from the field while the ball is in play, unless otherwise directed by the referee.","section":"5. Game Play","subsection":"5.14 Humans","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.14.4 5. game play 5.14 humans other team members may start one robot, but afterwards must not be within the vicinity of the playing field. they must remain more than one metre from the field while the ball is in play, unless otherwise directed by the referee."},{"number":"5.14.5","text":"If requested, team members starting the robots must be able to cover up any cyan, yellow or orange on their person or equipment that interferes with the other team's robot sensors (see also 4.3.2).","section":"5. Game Play","subsection":"5.14 Humans","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.14.5 5. game play 5.14 humans if requested, team members starting the robots must be able to cover up any cyan, yellow or orange on their person or equipment that interferes with the other team's robot sensors (see also 4.3.2)."},{"number":"5.15.1","text":"During Round Robin play, teams are allocated three points for a win, one point for a tie and 0 points for a loss.","section":"5. Game Play","subsection":"5.15 Selections for Finals","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.15.1 5. game play 5.15 selections for finals during round robin play, teams are allocated three points for a win, one point for a tie and 0 points for a loss."},{"number":"5.15.2","text":"Teams are ranked on the following criteria: total points, then total goals scored, then goal difference.","section":"5. Game Play","subsection":"5.15 Selections for Finals","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.15.2 5. game play 5.15 selections for finals teams are ranked on the following criteria: total points, then total goals scored, then goal difference."},{"number":"5.16.1","text":"At the National Events, final play-offs for 1st, 2nd, 3rd and 4th place will be conducted.","section":"5. Game Play","subsection":"5.16 Finals","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.16.1 5. game play 5.16 finals at the national events, final play-offs for 1st, 2nd, 3rd and 4th place will be conducted."},{"number":"5.17.1","text":"In the event of a tie at full time during a non-finals game, the tied score is recorded.","section":"5. Game Play","subsection":"5.17 Tied Games","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.17.1 5. game play 5.17 tied games in the event of a tie at full time during a non-finals game, the tied score is recorded."},{"number":"5.17.2","text":"In the event of a tie at full time during a finals game, the following procedure applies:","section":"5. Game Play","subsection":"5.17 Tied Games","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"5.17.2 5. game play 5.17 tied games in the event of a tie at full time during a finals game, the following procedure applies:"},{"number":"6.1.1","text":"During game play, the referee's decisions are final. Any argument with a referee's decision results in a yellow warning card. If argument continues, the referee gives a red card resulting in immediate forfeit of the game.","section":"6. Conflict Resolution","subsection":"6.1 Referee","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"6.1.1 6. conflict resolution 6.1 referee during game play, the referee's decisions are final. any argument with a referee's decision results in a yellow warning card. if argument continues, the referee gives a red card resulting in immediate forfeit of the game."},{"number":"6.1.2","text":"If team captains are satisfied with the result of a game, they sign the score sheet at the conclusion of play.","section":"6. Conflict Resolution","subsection":"6.1 Referee","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"6.1.2 6. conflict resolution 6.1 referee if team captains are satisfied with the result of a game, they sign the score sheet at the conclusion of play."},{"number":"6.1.3","text":"Any protest after the game should only be if the scoring is believed incorrect, or if a game result is in doubt. After signing the score sheet, no protests can be lodged.","section":"6. Conflict Resolution","subsection":"6.1 Referee","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"6.1.3 6. conflict resolution 6.1 referee any protest after the game should only be if the scoring is believed incorrect, or if a game result is in doubt. after signing the score sheet, no protests can be lodged."},{"number":"6.2.1","text":"Rule clarification may be made by members of the RoboCup Junior Australia Technical Committee.","section":"6. Conflict Resolution","subsection":"6.2 Rule Clarification","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"6.2.1 6. conflict resolution 6.2 rule clarification rule clarification may be made by members of the robocup junior australia technical committee."},{"number":"6.2.2","text":"If a rule clarification is needed, the referee should stop the game immediately, call referee's timeout (5.10.4), stop the clock, and confirm the ruling before continuing.","section":"6. Conflict Resolution","subsection":"6.2 Rule Clarification","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"6.2.2 6. conflict resolution 6.2 rule clarification if a rule clarification is needed, the referee should stop the game immediately, call referee's timeout (5.10.4), stop the clock, and confirm the ruling before continuing."},{"number":"6.3.1","text":"Specific modifications to the rules for special circumstances \u2014 such as unforeseen problems and/or capabilities of a team's robots \u2014 may be agreed at the time of the tournament, provided a majority of the contestants agree.","section":"6. Conflict Resolution","subsection":"6.3 Special Circumstances","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"6.3.1 6. conflict resolution 6.3 special circumstances specific modifications to the rules for special circumstances \u2014 such as unforeseen problems and/or capabilities of a team's robots \u2014 may be agreed at the time of the tournament, provided a majority of the contestants agree."},{"number":"7.1.1","text":"All robots will be examined by a panel of referees before the start of each day of the tournament to ensure they meet all constraints in section 4.","section":"7. Inspection","subsection":"7.1 Scrutineering","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.1.1 7. inspection 7.1 scrutineering all robots will be examined by a panel of referees before the start of each day of the tournament to ensure they meet all constraints in section 4."},{"number":"7.1.2","text":"It is the responsibility of teams to have their robots re-inspected if modified at any time during the tournament, including damage or changes during game play. Any team deemed to have an illegal robot following a game will forfeit that game.","section":"7. Inspection","subsection":"7.1 Scrutineering","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.1.2 7. inspection 7.1 scrutineering it is the responsibility of teams to have their robots re-inspected if modified at any time during the tournament, including damage or changes during game play. any team deemed to have an illegal robot following a game will forfeit that game."},{"number":"7.1.3","text":"Any violations of the inspection rules will prevent that robot from competing until modifications are made.","section":"7. Inspection","subsection":"7.1 Scrutineering","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.1.3 7. inspection 7.1 scrutineering any violations of the inspection rules will prevent that robot from competing until modifications are made."},{"number":"7.1.4","text":"Modifications must be made within the tournament schedule, and teams must not delay game play while making them.","section":"7. Inspection","subsection":"7.1 Scrutineering","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.1.4 7. inspection 7.1 scrutineering modifications must be made within the tournament schedule, and teams must not delay game play while making them."},{"number":"7.1.5","text":"The inspection may include, but is not limited to, checking the size, weight, ball capture zone depth, maximum voltage and kicker power of each robot.","section":"7. Inspection","subsection":"7.1 Scrutineering","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.1.5 7. inspection 7.1 scrutineering the inspection may include, but is not limited to, checking the size, weight, ball capture zone depth, maximum voltage and kicker power of each robot."},{"number":"7.2.1","text":"All teams will be interviewed by a panel selected by the Technical Committee over the course of the competition, preferably on the first day if the event spans multiple days, to ensure robots meet all constraints in section 7.3.","section":"7. Inspection","subsection":"7.2 Team Interviews","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.2.1 7. inspection 7.2 team interviews all teams will be interviewed by a panel selected by the technical committee over the course of the competition, preferably on the first day if the event spans multiple days, to ensure robots meet all constraints in section 7.3."},{"number":"7.2.2","text":"Tournament organisers are expected to conduct verification interviews prior to the finals of all events.","section":"7. Inspection","subsection":"7.2 Team Interviews","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.2.2 7. inspection 7.2 team interviews tournament organisers are expected to conduct verification interviews prior to the finals of all events."},{"number":"7.2.3","text":"Photos of the team's robots will be taken during the interview process and added to the Official RCJA Soccer Robot Database, to ensure robots are not handed down from team to team. If robots are not substantially the original work of the team members, the team will be disqualified.","section":"7. Inspection","subsection":"7.2 Team Interviews","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.2.3 7. inspection 7.2 team interviews photos of the team's robots will be taken during the interview process and added to the official rcja soccer robot database, to ensure robots are not handed down from team to team. if robots are not substantially the original work of the team members, the team will be disqualified."},{"number":"7.2.3","text":"(numbering as in the source) Teams are to submit an electronic journal, logbook or technical description paper of their journey designing, programming and testing the robots, as described in section 7.4.","section":"7. Inspection","subsection":"7.2 Team Interviews","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.2.3 7. inspection 7.2 team interviews (numbering as in the source) teams are to submit an electronic journal, logbook or technical description paper of their journey designing, programming and testing the robots, as described in section 7.4."},{"number":"7.3.1","text":"Construction and programming of robots must be performed exclusively by the competitors.","section":"7. Inspection","subsection":"7.3 Robot Construction","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.3.1 7. inspection 7.3 robot construction construction and programming of robots must be performed exclusively by the competitors."},{"number":"7.3.2","text":"Competitors will be interviewed to explain the operation of their robots, to verify the construction and programming is their own work.","section":"7. Inspection","subsection":"7.3 Robot Construction","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.3.2 7. inspection 7.3 robot construction competitors will be interviewed to explain the operation of their robots, to verify the construction and programming is their own work."},{"number":"7.3.3","text":"Competitors will be asked about their preparation efforts and may be requested to answer surveys and participate in recorded interviews for research purposes.","section":"7. Inspection","subsection":"7.3 Robot Construction","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.3.3 7. inspection 7.3 robot construction competitors will be asked about their preparation efforts and may be requested to answer surveys and participate in recorded interviews for research purposes."},{"number":"7.3.4","text":"Commercial kits may be used but must be substantially modified by the competitors.","section":"7. Inspection","subsection":"7.3 Robot Construction","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.3.4 7. inspection 7.3 robot construction commercial kits may be used but must be substantially modified by the competitors."},{"number":"7.3.5","text":"Proof of a full understanding of the program must be shown.","section":"7. Inspection","subsection":"7.3 Robot Construction","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.3.5 7. inspection 7.3 robot construction proof of a full understanding of the program must be shown."},{"number":"7.3.6","text":"If there is excessive mentor assistance, or the work is not substantially original work by the competitors, the team will be disqualified. Referees may request Technical Committee support during the competition if there are concerns that excessive mentoring may have occurred.","section":"7. Inspection","subsection":"7.3 Robot Construction","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.3.6 7. inspection 7.3 robot construction if there is excessive mentor assistance, or the work is not substantially original work by the competitors, the team will be disqualified. referees may request technical committee support during the competition if there are concerns that excessive mentoring may have occurred."},{"number":"7.4.1.1","text":"Teams must submit a copy of the most recent version of their competition code. The code must be clearly annotated with comments explaining the purpose and function of key sections, including (where applicable) sensor use, decision-making logic and actuator control.","section":"7. Inspection","subsection":"7.4 Electronic Submission","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.4.1.1 7. inspection 7.4 electronic submission teams must submit a copy of the most recent version of their competition code. the code must be clearly annotated with comments explaining the purpose and function of key sections, including (where applicable) sensor use, decision-making logic and actuator control."},{"number":"","text":"Teams may continue updating their code after the submission deadline but must maintain an up-to-date version of their annotated code. Students may be asked to show this updated code to judges on request.","section":"7. Inspection","subsection":"7.4 Electronic Submission","type":"note","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7. inspection 7.4 electronic submission teams may continue updating their code after the submission deadline but must maintain an up-to-date version of their annotated code. students may be asked to show this updated code to judges on request."},{"number":"7.4.1.2","text":"The submitted code must accurately reflect the robot used in competition.","section":"7. Inspection","subsection":"7.4 Electronic Submission","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.4.1.2 7. inspection 7.4 electronic submission the submitted code must accurately reflect the robot used in competition."},{"number":"7.4.1.3","text":"Teams who fail to submit their annotated code will not be permitted to compete.","section":"7. Inspection","subsection":"7.4 Electronic Submission","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.4.1.3 7. inspection 7.4 electronic submission teams who fail to submit their annotated code will not be permitted to compete."},{"number":"","text":"This can be submitted as a PowerPoint, screenshots with annotations, document, etc.","section":"7. Inspection","subsection":"7.4 Electronic Submission","type":"note","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7. inspection 7.4 electronic submission this can be submitted as a powerpoint, screenshots with annotations, document, etc."},{"number":"7.4.2.1","text":"Each team must submit one (1) poster communicating their team and robot design if the team wishes to be considered for special awards.","section":"7. Inspection","subsection":"7.4 Electronic Submission","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.4.2.1 7. inspection 7.4 electronic submission each team must submit one (1) poster communicating their team and robot design if the team wishes to be considered for special awards."},{"number":"","text":"This poster may be shared publicly. Teams must not include information that can't be publicly shared (e.g. student personal information other than first name, photos that allow personal identification, etc.).","section":"7. Inspection","subsection":"7.4 Electronic Submission","type":"note","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7. inspection 7.4 electronic submission this poster may be shared publicly. teams must not include information that can't be publicly shared (e.g. student personal information other than first name, photos that allow personal identification, etc.)."},{"number":"7.4.2.2","text":"The poster must be A3 size and must include all of the following: (1) Team name; (2) Team member first names and roles; (3) One interesting/innovative feature of the robot's design or engineering; (4) A challenge encountered during development and how it was overcome; (5) What the team has learned through participation.","section":"7. Inspection","subsection":"7.4 Electronic Submission","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.4.2.2 7. inspection 7.4 electronic submission the poster must be a3 size and must include all of the following: (1) team name; (2) team member first names and roles; (3) one interesting/innovative feature of the robot's design or engineering; (4) a challenge encountered during development and how it was overcome; (5) what the team has learned through participation."},{"number":"7.4.2.3","text":"The poster must be clear, well-presented and suitable for display. Teams may use any software (PowerPoint, Canva, Paint, etc.) or make a physical poster and submit a photo/scan. The poster must be the team's own original work.","section":"7. Inspection","subsection":"7.4 Electronic Submission","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.4.2.3 7. inspection 7.4 electronic submission the poster must be clear, well-presented and suitable for display. teams may use any software (powerpoint, canva, paint, etc.) or make a physical poster and submit a photo/scan. the poster must be the team's own original work."},{"number":"7.4.2.4","text":"Teams who fail to submit a poster will not be eligible for special awards.","section":"7. Inspection","subsection":"7.4 Electronic Submission","type":"rule","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7.4.2.4 7. inspection 7.4 electronic submission teams who fail to submit a poster will not be eligible for special awards."},{"number":"","text":"Teams are encouraged to bring a physical copy of their poster to display at the competition, though this is not mandatory.","section":"7. Inspection","subsection":"7.4 Electronic Submission","type":"note","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"7. inspection 7.4 electronic submission teams are encouraged to bring a physical copy of their poster to display at the competition, though this is not mandatory."},{"number":"A.1.1","text":"The official infrared balls for all RCJA tournaments will be the Elekit RCJ-05 soccer ball available from Modern Teaching Aids.","section":"Appendix A: Specification for Infrared Soccer Ball","subsection":"","type":"rule","leagues":["Simple Simon","Standard","Lightweight"],"changed":false,"searchText":"a.1.1 appendix a: specification for infrared soccer ball the official infrared balls for all rcja tournaments will be the elekit rcj-05 soccer ball available from modern teaching aids."},{"number":"","text":"The older, dark-grey infrared ball previously sold by HiTechnic, or approved open-source alternatives as they become available, is also acceptable.","section":"Appendix A: Specification for Infrared Soccer Ball","subsection":"","type":"note","leagues":["Simple Simon","Standard","Lightweight","Open"],"changed":false,"searchText":"appendix a: specification for infrared soccer ball the older, dark-grey infrared ball previously sold by hitechnic, or approved open-source alternatives as they become available, is also acceptable."},{"number":"A.1.2","text":"The ball will be used in pulsed and stepped-waveform mode \u2014 the Elekit RCJ-05 ball will be operated in MODE A (pulsed).","section":"Appendix A: Specification for Infrared Soccer Ball","subsection":"","type":"rule","leagues":["Simple Simon","Standard","Lightweight"],"changed":false,"searchText":"a.1.2 appendix a: specification for infrared soccer ball the ball will be used in pulsed and stepped-waveform mode \u2014 the elekit rcj-05 ball will be operated in mode a (pulsed)."},{"number":"A.2.1","text":"The ball shall emit infrared (IR) light of wavelengths in the range 920\u2013960 nm, pulsed at a square-wave carrier frequency of 40 kHz. The ball should have enough ultra-bright, wide-angle LEDs to minimise unevenness of the IR output.","section":"Appendix A: Specification for Infrared Soccer Ball","subsection":"","type":"rule","leagues":["Simple Simon","Standard","Lightweight"],"changed":false,"searchText":"a.2.1 appendix a: specification for infrared soccer ball the ball shall emit infrared (ir) light of wavelengths in the range 920\u2013960 nm, pulsed at a square-wave carrier frequency of 40 khz. the ball should have enough ultra-bright, wide-angle leds to minimise unevenness of the ir output."},{"number":"A.3.1","text":"The diameter of the ball is required to be 74 mm. A well-balanced ball shall be used.","section":"Appendix A: Specification for Infrared Soccer Ball","subsection":"","type":"rule","leagues":["Simple Simon","Standard","Lightweight"],"changed":false,"searchText":"a.3.1 appendix a: specification for infrared soccer ball the diameter of the ball is required to be 74 mm. a well-balanced ball shall be used."},{"number":"A.4.1","text":"The ball must resist normal game play. As an indication of durability, it should survive, undamaged, a free-fall from 1500 mm onto a hardwood table or floor.","section":"Appendix A: Specification for Infrared Soccer Ball","subsection":"","type":"rule","leagues":["Simple Simon","Standard","Lightweight"],"changed":false,"searchText":"a.4.1 appendix a: specification for infrared soccer ball the ball must resist normal game play. as an indication of durability, it should survive, undamaged, a free-fall from 1500 mm onto a hardwood table or floor."},{"number":"A.5.1","text":"The 40 kHz carrier output shall be modulated with a trapezoidal (stepped) waveform of frequency 1.2 kHz. Each 833-microsecond cycle shall comprise 8 carrier pulses at full intensity, followed by 4 pulses at 1/4 intensity, 4 pulses at 1/16 intensity, and 4 pulses at 1/64 intensity, followed by a space (zero intensity) of about 346 microseconds. The peak current in the LEDs shall be 45\u201355 mA. The radiant intensity of each LED shall be more than 20 mW/sr.","section":"Appendix A: Specification for Infrared Soccer Ball","subsection":"","type":"rule","leagues":["Simple Simon","Standard","Lightweight"],"changed":false,"searchText":"a.5.1 appendix a: specification for infrared soccer ball the 40 khz carrier output shall be modulated with a trapezoidal (stepped) waveform of frequency 1.2 khz. each 833-microsecond cycle shall comprise 8 carrier pulses at full intensity, followed by 4 pulses at 1/4 intensity, 4 pulses at 1/16 intensity, and 4 pulses at 1/64 intensity, followed by a space (zero intensity) of about 346 microseconds. the peak current in the leds shall be 45\u201355 ma. the radiant intensity of each led shall be more than 20 mw/sr."},{"number":"A.6.1","text":"If the ball has an embedded rechargeable battery, when new and f // Index: for each rule, store its position so we can find neighbours
// ── Stemmer (Porter-lite) ────────────────────────────────────────
function stem(w) {
  if (w.length <= 3) return w;
  if (w.endsWith('ations') && w.length > 8) return w.slice(0, -6);
  if (w.endsWith('ation')  && w.length > 7) return w.slice(0, -5);
  if (w.endsWith('ings')   && w.length > 6) return w.slice(0, -4);
  if (w.endsWith('ers')    && w.length > 5) return w.slice(0, -3);
  if (w.endsWith('ing')    && w.length > 5) return w.slice(0, -3);
  if (w.endsWith('ied')    && w.length > 5) return w.slice(0, -3) + 'y';
  if (w.endsWith('ies')    && w.length > 5) return w.slice(0, -3) + 'y';
  if (w.endsWith('er')     && w.length > 4) return w.slice(0, -2);
  if (w.endsWith('es')     && w.length > 4) return w.slice(0, -2);
  if (w.endsWith('ed')     && w.length > 4) return w.slice(0, -2);
  if (w.endsWith('ly')     && w.length > 5) return w.slice(0, -2);
  if (w.endsWith('s') && !w.endsWith('ss') && w.length > 3) return w.slice(0, -1);
  if (w.endsWith('e')      && w.length > 4) return w.slice(0, -1);
  return w;
}

// ── Synonym map (domain-specific) ───────────────────────────────
const SYNONYMS = {
  'ref':           ['referee'],
  'goalkeeper':    ['goalie'],
  'out of bounds': ['out of play'],
  'bounds':        ['out of play'],
  'dq':            ['disqualif'],
  'disq':          ['disqualif'],
  'lop':           ['lack of progress'],
  'ball cap':      ['capturing zone'],
  'bcz':           ['capturing zone'],
  'ball capture':  ['capturing zone'],
  'kg':            ['weight'],
  'passive ball':  ['orange'],
  'volt':          ['voltage'],
  'volts':         ['voltage'],
};

// ── Pre-build stemmed index for each rule ────────────────────────
RULES.forEach(r => {
  r.stemIdx = r.searchText.replace(/[^a-z0-9 ]/g, ' ').split(/\s+/).map(stem).join(' ');
});

const ruleEntries = RULES.filter(r => r.type === 'rule' && r.number);

let currentLeague = 'All';
let expandedSet = new Set();

const searchEl = document.getElementById('search');
const clearBtn = document.getElementById('clear-btn');
const resultsEl = document.getElementById('results');
const countEl = document.getElementById('result-count');
const changesEl = document.getElementById('changes-only');

searchEl.addEventListener('input', () => {
  clearBtn.style.display = searchEl.value ? 'flex' : 'none';
  expandedSet.clear();
  render();
});

function clearSearch() {
  searchEl.value = '';
  clearBtn.style.display = 'none';
  expandedSet.clear();
  render();
  searchEl.focus();
}

function setLeague(btn) {
  document.querySelectorAll('.league-btn').forEach(b => {
    b.classList.remove('active');
    b.setAttribute('aria-pressed', 'false');
  });
  btn.classList.add('active');
  btn.setAttribute('aria-pressed', 'true');
  currentLeague = btn.dataset.league;
  expandedSet.clear();
  render();
}

function toggleExpand(idx) {
  if (expandedSet.has(idx)) expandedSet.delete(idx);
  else expandedSet.add(idx);
  render();
}

function escapeRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(text, terms) {
  if (!terms.length) return escapeHtml(text);
  const pattern = terms.map(escapeRe).join('|');
  const re = new RegExp(`(${pattern})`, 'gi');
  return escapeHtml(text).replace(re, '<mark>$1</mark>');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const LEAGUE_CLASS = {'Simple Simon':'ss','Standard':'std','Lightweight':'lw','Open':'op'};

function leaguePills(leagues) {
  return leagues.map(l => `<span class="league-pill ${LEAGUE_CLASS[l]||''}">${l}</span>`).join('');
}

function getContext(rule) {
  const idx = ruleEntries.findIndex(r => r.number === rule.number);
  if (idx < 0) return [];
  const start = Math.max(0, idx - 2);
  const end = Math.min(ruleEntries.length - 1, idx + 2);
  return ruleEntries.slice(start, end + 1);
}

function render() {
  const raw = searchEl.value.trim();
  const terms = raw.split(/\s+/).filter(Boolean);
  const changesOnly = changesEl.checked;

  function ruleMatchesTerm(r, t) {
    const tl = t.toLowerCase();
    if (r.stemIdx.includes(stem(tl))) return true;
    const syns = SYNONYMS[tl] || [];
    return syns.some(s => r.searchText.includes(s));
  }

  let filtered = RULES.filter(r => {
    if (currentLeague !== 'All' && !r.leagues.includes(currentLeague)) return false;
    if (changesOnly && !r.changed) return false;
    if (!terms.length) return false;
    return terms.every(t => ruleMatchesTerm(r, t));
  });

  const highlightTerms = [...new Set([
    ...terms,
    ...terms.flatMap(t => SYNONYMS[t.toLowerCase()] || [])
  ])];

  countEl.textContent = terms.length || changesOnly
    ? `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`
    : '';

  if (!terms.length && !changesOnly) {
    resultsEl.innerHTML = '';
    return;
  }

  if (!filtered.length) {
    resultsEl.innerHTML = `<div class="no-results"><h3>No results for "${escapeHtml(raw)}"</h3><p>Try a different word or check the league filter</p></div>`;
    return;
  }

  const html = filtered.map((rule, i) => {
    const expanded = expandedSet.has(i);
    const typeClass = `type-${rule.type}`;
    const numLabel = rule.number || (rule.type === 'note' ? 'NOTE' : 'ADVICE');
    const breadcrumb = [rule.section, rule.subsection].filter(Boolean).join(' › ');
    const showLeagues = currentLeague === 'All' && rule.leagues.length < 4;

    let contextHtml = '';
    if (expanded && rule.type === 'rule' && rule.number) {
      const ctx = getContext(rule);
      contextHtml = `<div class="rule-context">
        <div class="context-heading">§ Context — ${rule.subsection || rule.section}</div>
        ${ctx.map(cr => `
          <div class="context-rule ${cr.number === rule.number ? 'is-match' : ''}">
            <div class="context-rule-num">${cr.number}</div>
            <div>${highlight(cr.text, highlightTerms)}</div>
          </div>`).join('')}
      </div>`;
    }

    return `<div class="rule-card ${typeClass} ${expanded ? 'expanded' : ''}">
      <div class="rule-main" onclick="toggleExpand(${i})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleExpand(${i})}" tabindex="0" role="button" aria-expanded="${expanded}">
        <div class="rule-header">
          <span class="rule-number">${numLabel}</span>
          ${rule.changed ? '<span class="changed-badge">2026 ★</span>' : ''}
          <span class="breadcrumb">${escapeHtml(breadcrumb)}</span>
        </div>
        <div class="rule-text">${highlight(rule.text, highlightTerms)}</div>
        ${showLeagues ? `<div class="league-pills">${leaguePills(rule.leagues)}</div>` : ''}
      </div>
      ${contextHtml}
    </div>`;
  }).join('');

  resultsEl.innerHTML = html;
}



render();
</script>
